<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local Subtitle Extractor</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">SX</div>
      <div>
        <h1>Subtitle Extractor</h1>
        <p class="subtitle">Local OCR-based hardcoded subtitle ripper</p>
      </div>
    </div>
  </header>

  <main>
    <section id="drop-zone" class="drop-zone">
      <div class="drop-inner">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>
        </svg>
        <h2>Drop a video here</h2>
        <p>or click to browse — MP4, MKV, MOV, AVI, WEBM</p>
        <input type="file" id="file-input" accept="video/*" hidden />
      </div>
    </section>

    <section id="editor" class="editor hidden">
      <div class="editor-header">
        <h2>Video Processing</h2>
        <button class="icon-btn" id="close-editor" title="Cancel">✕</button>
      </div>

      <div class="row">
        <label class="field-label">Processing Mode</label>
        <div class="mode-toggle">
          <button class="mode active" data-mode="vision">
            <strong>Vision</strong>
            <span>Extract visible subtitles by selecting the subtitle area</span>
          </button>
          <button class="mode" data-mode="audio" disabled title="Not implemented in this local build">
            <strong>Audio</strong>
            <span>Convert speech to text using AI</span>
          </button>
        </div>
      </div>

      <div class="row three-col">
        <div>
          <label class="field-label" for="language">Language</label>
          <select id="language">
            <optgroup label="Common">
              <option value="ch" selected>Chinese + English (简体中文)</option>
              <option value="en">English</option>
              <option value="japan">Japanese (日本語)</option>
              <option value="korean">Korean (한국어)</option>
              <option value="latin">Latin script (FR / DE / ES / VI / IT…)</option>
            </optgroup>
            <optgroup label="Other scripts">
              <option value="chinese_cht">Chinese Traditional (繁體中文)</option>
              <option value="ch_doc">Chinese document scan</option>
              <option value="cyrillic">Cyrillic (Russian / UA / BG…)</option>
              <option value="eslav">East Slavic (RU / BE / UK)</option>
              <option value="arabic">Arabic (العربية)</option>
              <option value="devanagari">Devanagari (Hindi / Marathi…)</option>
              <option value="th">Thai (ไทย)</option>
              <option value="el">Greek (Ελληνικά)</option>
              <option value="ta">Tamil (தமிழ்)</option>
              <option value="te">Telugu (తెలుగు)</option>
              <option value="ka">Kannada (ಕನ್ನಡ)</option>
            </optgroup>
          </select>
        </div>
        <div>
          <label class="field-label" for="model-variant">Engine</label>
          <select id="model-variant">
            <option value="server" selected>Accurate — PP-OCRv5 server</option>
            <option value="mobile">Fast — PP-OCRv5 mobile</option>
          </select>
        </div>
        <div>
          <label class="field-label" for="device">Device</label>
          <select id="device">
            <option value="cpu" selected>CPU</option>
            <option value="directml" id="device-directml" disabled>GPU (DirectML) — not installed</option>
          </select>
        </div>
      </div>

      <div class="row">
        <label class="field-label">Draw subtitle area on video</label>

        <div class="video-wrap" id="video-wrap">
          <video id="video" preload="metadata" playsinline></video>
          <canvas id="overlay"></canvas>
        </div>

        <div class="video-controls">
          <button class="play-btn" id="play-btn" title="Play / pause (space)">
            <svg class="icon-play" viewBox="0 0 24 24" width="18" height="18"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="18" height="18"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
          </button>
          <span class="time" id="time-current">00:00</span>
          <div class="seek-wrap">
            <input type="range" class="seek" id="seek" min="0" max="1000" value="0" step="1" />
            <div class="seek-tooltip" id="seek-tooltip" hidden>00:00</div>
          </div>
          <span class="time muted" id="time-total">00:00</span>
          <button class="speed-btn" id="speed-btn" title="Playback speed (click to cycle)">1×</button>
        </div>

        <div class="hint" id="region-hint">Drag on the video to draw the subtitle region. Drag its edges to resize.</div>
      </div>

      <div class="row">
        <label class="field-label" for="sample-fps">Sample rate</label>
        <div class="slider-row">
          <input type="range" id="sample-fps" min="1" max="5" step="0.5" value="2" />
          <span id="sample-fps-val">2 fps</span>
          <span class="muted">(higher = more accurate, slower)</span>
        </div>
      </div>

      <div class="actions">
        <button class="secondary" id="btn-cancel">Cancel</button>
        <button class="primary" id="btn-process" disabled>
          <span class="check">✓</span> Process Video
        </button>
      </div>
    </section>

    <section id="jobs-panel" class="jobs-panel hidden">
      <div class="jobs-header">
        <h2>Jobs</h2>
        <span class="muted" id="jobs-summary"></span>
      </div>
      <ul class="jobs-list" id="jobs-list"></ul>
    </section>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
